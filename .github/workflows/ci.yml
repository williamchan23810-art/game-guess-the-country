name: CI Quality Gate

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Linting Tools
      run: |
        npm init -y
        npm install eslint --save-dev

    - name: Run JS Syntax Linter
      run: |
        # Checks all JavaScript files in the root for structural or syntax errors
        npx eslint *.js --no-eslintrc --env browser,es2021 || true

    - name: Validate Markdown Links
      uses: tcort/markdown-link-check@v3.11.2
      with:
        use-quiet-mode: 'yes'
        config-file: '.github/workflows/mlc_config.json'
